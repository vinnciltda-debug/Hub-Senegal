<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Projeto acadêmico sobre Senegal — Moodboard visual e apresentação de dados multidisciplinares" />
  <title>Senegal — Projeto Acadêmico</title>

  <!-- Favicon: Senegal Flag -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 20'%3E%3Crect width='10' height='20' fill='%2300853F'/%3E%3Crect x='10' width='10' height='20' fill='%23FDEF42'/%3E%3Crect x='20' width='10' height='20' fill='%23E31B23'/%3E%3Cpath d='M15 6l1.2 3.7h3.9l-3.15 2.3 1.2 3.7L15 13.4l-2.15 2.3 1.2-3.7-3.15-2.3h3.9z' fill='%2300853F'/%3E%3C/svg%3E" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- AOS.js (Animate On Scroll) -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/site.css" />

  <!-- SortableJS -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>

<body class="public-view">

  <!-- Parallax Background -->
  <div class="parallax-bg" id="parallax-bg">
    <div class="parallax-layer parallax-layer--green"></div>
    <div class="parallax-layer parallax-layer--yellow"></div>
    <div class="parallax-layer parallax-layer--red"></div>
    <div class="parallax-layer parallax-layer--dots"></div>
  </div>

  <!-- ============ NAV TABS (2 tabs) ============ -->
  <nav class="main-tabs" id="main-tabs">
    <div class="tabs-container">
      <button class="tab-btn active" data-tab="presentation">Apresentação</button>
      <button class="tab-btn" data-tab="research">Pesquisa & Fontes</button>
    </div>
  </nav>

  <!-- ============ TAB 1: APRESENTAÇÃO ============ -->
  <main class="tab-panel active" id="panel-presentation">

    <!-- HERO -->
    <header class="hero" id="hero">
      <div class="hero-inner">
        <div class="hero-flag" data-aos="fade-down" data-aos-delay="100">
          <span class="flag-green"></span>
          <span class="flag-yellow"></span>
          <span class="flag-red"></span>
        </div>
        <h1 class="hero-title" data-aos="fade-up" data-aos-delay="200" id="hero-title">Senegal</h1>
        <p class="hero-subtitle" data-aos="fade-up" data-aos-delay="400" id="hero-subtitle">Projeto Acadêmico — Análise Multidisciplinar</p>
        <div class="hero-scroll-hint" data-aos="fade-up" data-aos-delay="600" id="scroll-hint">
          <span>Explore o Moodboard</span>
          <i data-lucide="chevron-down"></i>
        </div>
      </div>
    </header>

    <!-- MOODBOARD COLLAGE -->
    <section class="moodboard-section" id="moodboard-section">
      <div class="section-label" data-aos="fade-in" style="max-width:400px;margin:0 auto var(--space-lg);">
        <span class="label-line"></span>
        <span class="label-text">Moodboard</span>
        <span class="label-line"></span>
      </div>
      <div class="container">
        <div class="moodboard-collage" id="moodboard-collage">
          <!-- Tiles injected by JS -->
        </div>
      </div>
    </section>

    <!-- TOPIC SECTIONS (A-F) -->
    <div id="topics-container">
      <!-- Each topic slide generated by JS -->
    </div>

  </main>

  <!-- ============ TAB 2: PESQUISA & FONTES ============ -->
  <section class="tab-panel" id="panel-research">
    <div class="container research-section">

      <!-- Research Summary -->
      <div class="text-center mb-5" data-aos="fade-up">
        <h2 class="panel-title mb-2">Pesquisa <span class="text-gradient">&</span> Fontes</h2>
        <p class="text-secondary">Fundamentação acadêmica e materiais de referência</p>
      </div>

      <div class="row g-4 mb-5" id="research-grid">
        <!-- Cards A-F injected by JS -->
      </div>

      <!-- PDFs Section -->
      <div class="mt-5 pt-4" data-aos="fade-up">
        <h3 class="h5 mb-4 d-flex align-items-center gap-2">
          <i data-lucide="file-text" class="text-red"></i>
          Documentos PDF
        </h3>
        <div class="row g-3" id="pdf-grid">
          <!-- PDF cards injected by JS -->
        </div>
      </div>

      <!-- References -->
      <div class="mt-5 pt-4" data-aos="fade-up">
        <h3 class="h5 mb-4 d-flex align-items-center gap-2">
          <i data-lucide="bookmark" class="text-green"></i>
          Referências Bibliográficas
        </h3>
        <div class="row g-2" id="references-list">
          <!-- Ref items injected by JS -->
        </div>
      </div>

      <!-- Team (Quem Somos) -->
      <div class="mt-5 pt-5 border-top" style="border-color: var(--border-subtle) !important;" data-aos="fade-up">
        <div class="text-center mb-5">
          <h3 class="h4 mb-2">Quem Somos</h3>
          <p class="text-secondary small">A equipe por trás do projeto</p>
        </div>
        <div class="row g-4 justify-content-center" id="team-grid">
          <!-- Team cards injected by JS -->
        </div>
      </div>

    </div>
  </section>

  <!-- Lateral Slide Arrows -->
  <button class="slide-arrow slide-arrow--left" id="prev-slide" title="Slide Anterior">
    <i data-lucide="chevron-left"></i>
  </button>
  <button class="slide-arrow slide-arrow--right" id="next-slide" title="Próximo Slide">
    <i data-lucide="chevron-right"></i>
  </button>
  <!-- Slide Indicator (bottom center with small controls) -->
  <div class="slide-indicator-bar" id="presentation-controls">
    <button class="nav-btn-sm" id="prev-slide-sm" title="Anterior">
      <i data-lucide="chevron-left"></i>
    </button>
    <div class="slide-indicator" id="slide-number">1 / 8</div>
    <button class="nav-btn-sm" id="next-slide-sm" title="Próximo">
      <i data-lucide="chevron-right"></i>
    </button>
  </div>

  <!-- Back to top -->
  <button class="back-to-top" id="back-to-top" title="Voltar ao topo" aria-label="Voltar ao topo">
    <i data-lucide="chevron-up"></i>
  </button>

  <!-- Side Nav Dots -->
  <nav class="side-nav" id="side-nav">
    <!-- dots added by JS -->
  </nav>

  <!-- Footer -->
  <footer class="site-footer">
    <a href="admin.html">Acesso Restrito</a>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
